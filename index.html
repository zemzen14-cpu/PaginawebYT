<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat + Voz</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>💬 Chat Global</h1>

<div id="chat"></div>

<div class="input-box">
    <input id="mensaje" placeholder="Escribe un mensaje...">
    <button onclick="enviarMensaje()">Enviar</button>
</div>

<h2>🔊 Texto a Voz</h2>

<div class="voz-box">
    <input id="texto" placeholder="Escribe algo...">
    <button onclick="generarVoz()">Generar Voz</button>
</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
